<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskuTeoria - Offline</title>
    <style>
      :root {
        --bg: #f4f1e8;
        --card: #ffffff;
        --text: #1b1f23;
        --muted: #5e6a75;
        --primary: #0b6e4f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
      }
      .card {
        max-width: 460px;
        background: var(--card);
        border: 1px solid #d8ddd2;
        border-radius: 14px;
        padding: 1rem;
      }
      h1 { margin: 0 0 .5rem; }
      p { margin: 0 0 .75rem; color: var(--muted); }
      a {
        display: inline-block;
        text-decoration: none;
        background: var(--primary);
        color: #fff;
        padding: .65rem .9rem;
        border-radius: 10px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Olet offline-tilassa</h1>
      <p>TaskuTeoria toimii osittain ilman verkkoyhteytta. Yrita uudelleen tai palaa etusivulle.</p>
      <a href="./">Palaa etusivulle</a>
    </section>
  </body>
</html>
